services:
  - type: web
    name: email-salsify
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASSWORD
        sync: false
