<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion – Email Salsify</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d47a1 0%, #1a73e8 50%, #34a853 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: white; border-radius: 16px;
      padding: 40px 44px; width: 100%; max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo div:first-child { font-size: 48px; margin-bottom: 8px; }
    .logo h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }
    .logo p  { font-size: 13px; color: #888; margin-top: 4px; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #555;
            text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    input {
      width: 100%; border: 1.5px solid #dde1e7; border-radius: 8px;
      padding: 11px 14px; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,.1); }

    .btn {
      width: 100%; padding: 13px; background: #1a73e8; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .2s; margin-top: 8px;
    }
    .btn:hover { background: #1558b0; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .error {
      background: #fee2e2; color: #991b1b; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; margin-top: 14px;
      display: none;
    }
    .error.show { display: block; }

    .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div>📧</div>
    <h1>Email Salsify</h1>
    <p>Connectez-vous pour accéder à l'outil</p>
  </div>

  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Identifiant</label>
      <input type="text" id="username" placeholder="Votre identifiant" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="Votre mot de passe" autocomplete="current-password" required />
    </div>
    <button type="submit" class="btn" id="btnLogin">Se connecter</button>
    <div class="error" id="errorMsg"></div>
  </form>

  <div class="footer">Accès restreint — usage interne uniquement</div>
</div>

<script>
  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errorMsg');
    btn.disabled = true;
    btn.textContent = 'Connexion…';
    err.classList.remove('show');

    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();

    if (data.success) {
      window.location.href = '/';
    } else {
      err.textContent = data.message || 'Identifiants incorrects.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  }
</script>
</body>
</html>
